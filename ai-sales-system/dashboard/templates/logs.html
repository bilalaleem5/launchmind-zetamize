<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Logs — ZetaMize SDR</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0b0f;--bg2:#13141a;--bg3:#1a1c25;--border:#2a2d3e;--accent:#6c63ff;--accent2:#00d4ff;--success:#00e5a0;--warning:#ffb347;--danger:#ff4757;--text:#e8eaf6;--text2:#9095b0;--text3:#5a5f7a;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
  nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:60px;gap:32px;position:sticky;top:0;}
  .nav-brand{font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  nav a{color:var(--text2);text-decoration:none;font-size:14px;font-weight:500;padding:6px 12px;border-radius:8px;}
  nav a:hover,nav a.active{color:var(--text);background:var(--bg3);}
  .container{max-width:1100px;margin:0 auto;padding:24px;}
  .page-title{font-size:24px;font-weight:700;margin-bottom:24px;}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
  .log-row{display:flex;align-items:baseline;gap:14px;padding:12px 16px;border-bottom:1px solid rgba(42,45,62,.5);font-size:13px;transition:background .15s;}
  .log-row:hover{background:rgba(108,99,255,.04);}
  .log-row:last-child{border-bottom:none;}
  .log-time{color:var(--text3);white-space:nowrap;font-size:12px;min-width:130px;font-variant-numeric:tabular-nums;}
  .log-level{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap;}
  .level-info{background:rgba(0,212,255,.1);color:var(--accent2);}
  .level-warning{background:rgba(255,179,71,.1);color:var(--warning);}
  .level-error{background:rgba(255,71,87,.1);color:var(--danger);}
  .log-agent{color:var(--accent);font-weight:600;min-width:80px;}
  .log-msg{color:var(--text2);line-height:1.5;}
  .empty{text-align:center;padding:60px;color:var(--text3);}
</style>
</head>
<body>
<nav>
  <div class="nav-brand">🤖 ZetaMize SDR</div>
  <a href="/">Dashboard</a><a href="/pipeline">Pipeline</a>
  <a href="/leads">Leads</a><a href="/products">Products</a><a href="/logs" class="active">Logs</a>
</nav>
<div class="container">
  <div class="page-title">System Logs</div>
  <div class="card">
    {% for log in logs %}
    <div class="log-row">
      <span class="log-time">{{ log.created_at[:19].replace('T',' ') }}</span>
      <span class="log-level level-{{ log.level }}">{{ log.level.upper() }}</span>
      <span class="log-agent">{{ log.agent }}</span>
      <span class="log-msg">{{ log.message }}</span>
    </div>
    {% endfor %}
    {% if not logs %}
    <div class="empty"><h3>📋 No logs yet</h3><p>Run the CLI to start generating activity logs</p></div>
    {% endif %}
  </div>
</div>
</body></html>
